# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Kronos Tree Configuration — Unified Dynamic Config
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# ┏━━━━━━━━━━ Paths ━━━━━━━━━━┓
paths:
  csv_dir: "/home/till/PycharmProjects/Secondary-Model/src/Data_MLA/Kronos/Crypto/TP/horizon_7"
  output_root: "/home/till/PycharmProjects/Secondary-Model/src/Output"

experiment:
  m1: "kronos"  # choice: ["chronos2", "fincast", "tirex", "kronos"]
  m2: [ "randforest" ]  # choice: ["randforest", "xgboost", "autogluon", "tabpfn", "tabpfn_ft", "tabicl"]
  direction: [ "up" ]  # choices: ["up", "down"]
  granularity: [ "1d", "12h", "8h", "6", "4h", "2h", "1h", "30m" ]  # choices: ["1d", "12h", "8h", "6", "4h", "2h", "1h", "30m"]

# ┏━━━━━━━━━━ Data Configuration ━━━━━━━━━━┓
data:
  load:
    symbol: null          # or null for multi-asset or ["BTC", "ETH", "XRP", ...]
    m1: "kronos"     # Derived from env M1_MODEL (e.g. kronos, fincast, tirex)
    target_col: "meta_label"  # "meta_label" or "close" or "ground_truth"
    meta_label_mode: "tp"          # "fp" or "tp" or "og"
    direction: "up"          # "up" or "down"
    granularity: "all"         # "1d", "4h", etc. or "all" for multi-granularity
    forecast_horizon: 7

  # ┏━━━━━━━━━━ Data Splits ━━━━━━━━━━┓
  split:
    start_date: "2024-07-01"
    train_end: "2025-05-30"
    val_end: "2025-10-01"
    end_date: "2026-01-25"

  # ┏━━━━━━━━━━ Features ━━━━━━━━━━┓
  features:
    input: [ "open", "high", "low", "close", "volume" ]

    # ┏━━━━━━━━━━ Engineered Window Features ━━━━━━━━━━┓
    engineered_features:
      selected: [ bb_pctb_last, rsi_last, roc_5_last, roc_20_last, atr_norm_last ]

    # ┏━━━━━━━━━━ Feature Selection (MDA / SHAP / LIME) ━━━━━━━━━━┓
    feature_selection:
      enabled: false                    # set to false to skip MDA/SHAP/LIME
      methods: [ "mda", "shap", "lime" ] # any subset of: mda, shap, lime
      top_k: null                      # null = rank only (no pruning), int = keep top-k

# ┏━━━━━━━━━━ Evaluation ━━━━━━━━━━┓
evaluation:
  fee_per_trade: 0.002

# ┏━━━━━━━━━━ Runtime / Experiment Configuration ━━━━━━━━━━┓
runtime:
  skip:
    training: true  # choice: ["true" or "false"]
    edge: true  # choice: ["true" or "false"]
    combined: true  # choice: ["true" or "false"]
    feature_selection: false  # choice: ["true" or "false"]

  training:
    ocp_costs: [ 0, 10 ,2 ]  # Cost vector c_FN,c_FP,c_DEF for cost-aware deferral (default: '0,10,2')
    ocp_alpha: 0.10  # OCP target miscoverage rate (default: 0.10 → 90%% coverage target)
    ocp_window_days: 25  # Calibration window in calendar days for OCP-W/OCP-cost modes (default: 25)
    paradigm_comparison: null  # "Cross-paradigm comparison: pass 2+ result dirs (e.g. autogluon_7_fees randforest_7_fees randforest_OCP)
    combined_backtest: null  # [str, str]; Combined UP+DOWN backtest from two existing result dirs (e.g. Output/Kronos/randforest/UP/Utility_Score Output/Kronos/randforest/DOWN/Utility_Score
    comparison: null  # [str, str]; Build comparison table from existing per-gran and unified result dirs
    all_grans: false  # Unified model trained on all granularities, evaluated per-gran
    thresh: "utility"  # "Threshold selection: 'utility' (financial utility on val), "
      #"'OCP' (SAOCP, unbounded history), "
      #"'OCP-W' (SAOCP, windowed calibration), "
      #"'OCP-cost' (cost-aware deferral, vanilla), "
    #"'OCP-cost-mondrian' (cost-aware deferral, volatility-regime-conditional)"
  top5: false  # TODO check how to use this properly; Whether to run top-5 feature analysis/backtest
  run_features: false  # TODO check how to use this properly; Whether to run feature importance analysis (MDA/SHAP/LIME) on top-k features (if top_k is set) or all features (if top_k is null)

  edge:
    n_trials: 100
    n_blocks: 6
    k_test: 2

  combined:
    combined_backtest: [ "place_holder_up", "place_holder_down" ]  # TODO here we need a cleaner solution...
    ocp_costs: [ 0, 10, 2 ]  # Cost vector c_FN,c_FP,c_DEF for cost-aware deferral (default: '0,10,2')

  feature_selection: # TODO
    cv_strategy: "cpcv"  # choices: ["cpcv", "tscv", "pecv"]
    n_blocks: 10
    k_test: 2
    method: "sfs+"
    scoring: "accuracy"  # choices: ["accuracy", "precision", "roc_auc"]
    min_features: 1
    max_features: 33
    take_n_best_combinations: 3  # maybe set to 10
